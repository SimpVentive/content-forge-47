<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="unitol-title">
  <title id="unitol-title">UniTol Training Solutions</title>
  
  <!-- Logo: 4-square grid with colors, plus dark blue bar -->
  <!-- Top-left: Green -->
  <rect x="0" y="0" width="28" height="28" fill="#52B867"/>
  <!-- Top-right: Orange/Red -->
  <rect x="32" y="0" width="28" height="28" fill="#E8922A"/>
  <!-- Bottom-left: Red/Orange -->
  <rect x="0" y="32" width="28" height="28" fill="#E85D3A"/>
  <!-- Bottom-right: Dark blue -->
  <rect x="32" y="32" width="28" height="28" fill="#0D1559"/>
  
  <!-- Dark blue bar on right -->
  <rect x="68" y="0" width="32" height="60" fill="#0D1559"/>
  
  <!-- Wordmark text -->
  <text x="110" y="32" font-family="'Arial','Helvetica',sans-serif" font-size="32" font-weight="700" fill="#0D1559">UniTol</text>
  <text x="110" y="55" font-family="'Arial','Helvetica',sans-serif" font-size="12" font-weight="500" fill="#0D1559" letter-spacing="1">TRAINING SOLUTIONS</text>
</svg>
